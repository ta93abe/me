name: Quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, test, typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm exec oxfmt --check src

      - name: Unit tests
        run: pnpm test:run

      - name: Generate Worker types
        run: pnpm exec wrangler types

      - name: Astro check
        run: pnpm exec astro check
